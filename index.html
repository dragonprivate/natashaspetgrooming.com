<!doctype html>
<html lang="en">
<head>
  <link rel="canonical" href="https://natashaspetgrooming.com/">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>Natasha's Pet Grooming | At-Home Pet Grooming in Raeford, NC</title>
  <meta
    name="description"
    content="Natasha's Pet Grooming offers at-home pet grooming for dogs and cats in and around Raeford, NC. Small, medium, and large packages, haircuts, puppy and kitten packages, and extras."
  />

  <meta property="og:title" content="Natasha's Pet Grooming" />
  <meta property="og:description" content="At-home pet grooming for dogs and cats in and around Raeford, NC." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://natashaspetgrooming.com/" />

  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Natasha's Pet Grooming" />
  <meta name="twitter:description" content="At-home pet grooming for dogs and cats in and around Raeford, NC." />

  <link rel="stylesheet" href="./style.css?v=5" />

  <link rel="icon" type="image/png" href="./assets/ivy_logo.png" />
  <link rel="shortcut icon" type="image/png" href="./assets/ivy_logo.png" />
  <link rel="apple-touch-icon" href="./assets/ivy_logo.png" />
</head>
<body>
  <div class="page-bg"></div>

  <main class="page">
    <section class="hero">
      <div class="hero__text">
        <span class="eyebrow" id="heroEyebrow">At-home pet grooming</span>
        <h1 id="businessName">Natasha's Pet Grooming</h1>
        <p class="lead" id="heroLead"></p>
        <p class="service-area" id="serviceArea"></p>

        <div class="hero__actions">
          <a class="btn btn--primary" id="callBtn" href="#">Call</a>
          <a class="btn btn--secondary" id="emailBtn" href="#">Email</a>
        </div>
      </div>

      <div class="hero__card">
        <div class="card-glow"></div>
        <img
          src="./assets/natasha-card.png"
          alt="Natasha's Pet Grooming business card"
        />
      </div>
    </section>

    <section class="contact-band">
      <div class="contact-item">
        <span class="contact-label">Phone</span>
        <a id="phoneLink" href="#"></a>
      </div>

      <div class="contact-item">
        <span class="contact-label">Email</span>
        <a id="emailLink" href="#"></a>
      </div>
    </section>

    <section class="info-grid">
      <article class="info-card">
        <h2>About</h2>
        <p id="aboutText"></p>
      </article>

      <article class="info-card">
        <h2>Booking</h2>
        <p id="bookingText"></p>
        <div class="mini-actions">
          <a class="mini-link" id="callMiniBtn" href="#">Call / Text</a>
          <a class="mini-link" id="emailMiniBtn" href="#">Send Email</a>
        </div>
      </article>

      <article class="info-card info-card--accent">
        <h2>Contact</h2>
        <ul class="contact-list" id="contactList"></ul>
      </article>
    </section>

    <section class="pricing-section">
      <div class="section-pill">Packages</div>
      <div id="packageNotes"></div>

      <div class="package-grid" id="packageGrid"></div>
    </section>

    <section class="info-grid info-grid--services" id="serviceColumns"></section>

    <section class="extras-section">
      <div class="section-pill">Extras</div>
      <p class="section-note" id="individualServicesNote"></p>

      <div class="extras-card">
        <ul class="price-list" id="extrasList"></ul>
      </div>
    </section>

    <footer class="footer">
      <span id="footerBusinessName">Natasha's Pet Grooming</span>
      <span class="dot">•</span>
      <span id="footerArea"></span>
      <span class="dot">•</span>
      <span><a id="footerPhone" href="#"></a></span>
      <span class="dot">•</span>
      <span><a id="footerEmail" href="#"></a></span>
    </footer>
  </main>

  <script src="./script.js?v=1"></script>
</body>
</html>
